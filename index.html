<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAYO Bar | Coming Soon</title>
    <meta name="description" content="CAYO Bar - קוקטיילים צבעוניים ואווירה אקזוטית שמרגישה כמו חופשה. בקרוב אצלכם.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 650px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding-top: 15vh;
            padding-bottom: 15vh;
        }

        /* Logo text */
        .logo-text {
            animation: fadeIn 1.2s ease-out;
            font-family: 'Assistant', sans-serif;
            font-size: 7rem;
            font-weight: 800;
            letter-spacing: 24px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* Main text */
        .tagline {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.8rem;
            letter-spacing: 0.5px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255,255,255,0.55);
            margin-bottom: 3rem;
            line-height: 1.8;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        /* Minimal divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
            animation: fadeInUp 1s ease-out 0.7s both;
        }

        .divider-line {
            width: 50px;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        .divider-dot {
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Coming soon badge */
        .badge {
            display: inline-block;
            padding: 0.8rem 3.5rem;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
            animation: fadeInUp 1s ease-out 0.9s both;
            transition: border-color 0.3s ease;
        }

        .badge:hover {
            border-color: rgba(255,255,255,0.8);
        }

        /* Social links */
        .social {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            animation: fadeInUp 1s ease-out 1.1s both;
        }

        .social a {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social a:hover {
            border-color: #ffffff;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .social a svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.75rem;
            font-weight: 300;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            z-index: 1;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .tagline { font-size: 1.5rem; }
            .subtitle { font-size: 1rem; }
            .logo-text { font-size: 4.5rem; letter-spacing: 16px; }
            .badge { font-size: 1rem; letter-spacing: 4px; padding: 0.6rem 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">CAYO</div>

        <span class="badge">Coming Soon</span>
    </div>

    <div class="footer">CAYO BAR &copy; 2025</div>
</body>
</html>
